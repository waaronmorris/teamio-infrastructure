name: TeamIO
options:
  bundleIdPrefix: com.getteamio
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: 1
    SWIFT_STRICT_CONCURRENCY: complete

targets:
  TeamIO:
    type: application
    platform: iOS
    sources:
      - TeamIO
    resources:
      - TeamIO/Resources
    settings:
      base:
        INFOPLIST_FILE: TeamIO/App/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.getteamio.app
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGNING_REQUIRED: "NO"
        CODE_SIGNING_ALLOWED: "NO"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_XR_DESIGNED_FOR: false
    dependencies:
      - target: TeamIOWidget
        embed: true
    scheme:
      testTargets:
        - TeamIOTests

  TeamIOWidget:
    type: app-extension
    platform: iOS
    sources:
      - TeamIOWidget
    settings:
      base:
        INFOPLIST_FILE: TeamIOWidget/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.getteamio.app.widget
        CODE_SIGNING_REQUIRED: "NO"
        CODE_SIGNING_ALLOWED: "NO"
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_VERSION: "6.0"
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks @executable_path/../../Frameworks"
        GENERATE_INFOPLIST_FILE: "NO"

  TeamIOTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - TeamIOTests
    dependencies:
      - target: TeamIO
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.getteamio.app.tests
