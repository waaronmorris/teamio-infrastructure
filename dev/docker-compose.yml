version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: teamio-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-teamio}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-teamio_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-teamio}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-teamio} -d ${POSTGRES_DB:-teamio}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Backend API (Rust/Axum)
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: teamio-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-teamio}:${POSTGRES_PASSWORD:-teamio_dev_password}@db:5432/${POSTGRES_DB:-teamio}
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_change_in_production}
      RUST_LOG: ${RUST_LOG:-info,teamio_backend=debug}
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 8082
    ports:
      - "8082:8082"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  # Frontend (React/Vite)
  frontend:
    build:
      context: ../frontend-lovable
      dockerfile: Dockerfile
    container_name: teamio-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:8082/api
    ports:
      - "3000:3000"
    volumes:
      # Mount source for hot reload in development
      - ../frontend-lovable/src:/app/src:ro
      - ../frontend-lovable/public:/app/public:ro

  # pgAdmin (optional - for database management)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: teamio-pgadmin
    restart: unless-stopped
    profiles:
      - tools
    depends_on:
      - db
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@teamio.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin

volumes:
  postgres_data:
  pgadmin_data:

networks:
  default:
    name: teamio-network
