services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: teamio-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-teamio}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-teamio_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-teamio}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-teamio} -d ${POSTGRES_DB:-teamio}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Backend API (Rust/Axum)
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: teamio-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-teamio}:${POSTGRES_PASSWORD:-teamio_dev_password}@db:5432/${POSTGRES_DB:-teamio}
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_change_in_production}
      RUST_LOG: ${RUST_LOG:-info,teamio_backend=debug}
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 8080
      # Multi-tenancy: allow all origins in dev (set to https://*.getteamio.com in production)
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
    ports:
      - "8082:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  # Frontend (React + Nginx)
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: teamio-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3080:80"
    volumes:
      - uploads_data:/app/uploads

  # pgAdmin (optional - for database management)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: teamio-pgadmin
    restart: unless-stopped
    profiles:
      - tools
    depends_on:
      - db
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@teamio.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin

  # QA Chaos Agent (on-demand - use `docker compose run qa-agent`)
  qa-agent:
    build:
      context: ./qa-chaos-agent
      dockerfile: Dockerfile
    container_name: teamio-qa-agent
    profiles:
      - qa
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_healthy
    environment:
      BASE_URL: http://frontend:80
      API_URL: http://backend:8080
      HEADLESS: "true"
      MAX_DURATION: ${QA_MAX_DURATION:-300000}
      MAX_PAGES: ${QA_MAX_PAGES:-50}
      ACTION_DELAY: ${QA_ACTION_DELAY:-1000}
      # GitHub issue filing (optional)
      FILE_GITHUB_ISSUES: ${FILE_GITHUB_ISSUES:-false}
      DRY_RUN: ${DRY_RUN:-false}
      GITHUB_REPO: ${GITHUB_REPO:-waaronmorris/teamio}
      GITHUB_MIN_SEVERITY: ${GITHUB_MIN_SEVERITY:-warning}
      GH_TOKEN: ${GH_TOKEN:-}
      # Claude AI analysis (optional)
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      # PostHog error collection (optional)
      POSTHOG_API_KEY: ${POSTHOG_API_KEY:-}
      POSTHOG_PROJECT_ID: ${POSTHOG_PROJECT_ID:-}
      POSTHOG_HOST: ${POSTHOG_HOST:-https://us.i.posthog.com}
    volumes:
      - qa_reports:/app/reports

volumes:
  postgres_data:
  pgadmin_data:
  uploads_data:
  qa_reports:

networks:
  default:
    name: teamio-network
